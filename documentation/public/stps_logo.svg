<svg width="600" height="240" viewBox="0 0 600 240" role="img" xmlns="http://www.w3.org/2000/svg">
<title>STPS Logo — Dark</title>
<desc>STPS Trust Protocol — versão dark</desc>
<defs>
  <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#5DCAA5"/>
    <stop offset="100%" stop-color="#1D9E75"/>
  </linearGradient>
  <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#5DCAA5"/>
    <stop offset="100%" stop-color="#9FE1CB"/>
  </linearGradient>
</defs>

<rect width="600" height="240" fill="#04100C"/>

<g transform="translate(128, 120)">
  <polygon points="0,-88 76.2,-44 76.2,44 0,88 -76.2,44 -76.2,-44" fill="#063326"/>
  <polygon points="0,-88 76.2,-44 76.2,44 0,88 -76.2,44 -76.2,-44" fill="none" stroke="url(#hexStroke)" stroke-width="1.5"/>
  <polygon points="0,-66 57.2,-33 57.2,33 0,66 -57.2,33 -57.2,-33" fill="none" stroke="#5DCAA5" stroke-width="0.6" opacity="0.25"/>
  <!-- checkmark apenas -->
  <path d="M -22 0 L -8 16 L 24 -18" fill="none" stroke="url(#checkGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- score dots -->
  <circle cx="-24" cy="72" r="4.5" fill="#5DCAA5"/>
  <circle cx="-12" cy="78" r="4.5" fill="#5DCAA5"/>
  <circle cx="0"   cy="80" r="4.5" fill="#5DCAA5"/>
  <circle cx="12"  cy="78" r="4.5" fill="#5DCAA5"/>
  <circle cx="24"  cy="72" r="4.5" fill="#0F6E56" opacity="0.6"/>
</g>

<line x1="254" y1="62" x2="254" y2="178" stroke="#1D9E75" stroke-width="0.8" opacity="0.4"/>

<text x="278" y="146"
  font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
  font-size="82" font-weight="500" letter-spacing="-1"
  fill="#5DCAA5" text-anchor="start">STPS</text>
<text x="280" y="174"
  font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
  font-size="11" font-weight="400" letter-spacing="5"
  fill="#1D9E75" opacity="0.85" text-anchor="start">TRUST PROTOCOL</text>
</svg>
